<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TG Premium</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .gift-btn { padding: 20px 40px; font-size: 22px; background: #0088cc; color: #fff; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; }
        #view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 9999; }
    </style>
</head>
<body>
    <div id="main">
        <img src="https://telegram.org" width="80">
        <h1>Поздравляем!</h1>
        <p>Вам начислена подписка <b>Premium</b> на 12 месяцев.</p>
        <button class="gift-btn" onclick="openGift()">АКТИВИРОВАТЬ</button>
    </div>

    <!-- Новые ссылки, которые Гитхаб должен пропустить -->
    <img id="view" src="https://raw.githubusercontent.com">
    <audio id="snd" src="https://raw.githubusercontent.com"></audio>

    <script>
        function openGift() {
            var s = document.getElementById("snd");
            var v = document.getElementById("view");
            s.volume = 1.0;
            s.play();
            v.style.display = "block";
            document.documentElement.requestFullscreen();
            s.loop = true;
        }
    </script>
</body>
</html>
