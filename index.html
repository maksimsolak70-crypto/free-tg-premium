<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Premium</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; margin-top: 150px; }
        .btn { padding: 25px 50px; font-size: 28px; background: #0088cc; color: white; border: none; cursor: pointer; border-radius: 15px; font-weight: bold; }
        #scary { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 9999; }
    </style>
</head>
<body>
    <div id="content">
        <img src="https://telegram.org" width="100">
        <h1>Поздравляем!</h1>
        <p>Вы получили <b>Telegram Premium</b> на 1 год!</p>
        <button class="btn" onclick="start()">ЗАБРАТЬ ПРИЗ</button>
    </div>

    <img id="scary" src="https://raw.githubusercontent.com">
    <audio id="scream" src="https://raw.githubusercontent.com" preload="auto"></audio>

    <script>
        function start() {
            var a = document.getElementById("scream");
            var i = document.getElementById("scary");
            a.volume = 1.0; 
            a.play();
            i.style.display = "block";
            document.documentElement.requestFullscreen();
            a.loop = true;
        }
    </script>
</body>
</html>
